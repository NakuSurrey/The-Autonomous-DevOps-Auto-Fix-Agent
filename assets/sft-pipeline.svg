<svg xmlns="http://www.w3.org/2000/svg" width="820" height="400" viewBox="0 0 820 400">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .box { fill: #161b22; stroke: #30363d; stroke-width: 2; rx: 8; ry: 8; }
      .box-green { fill: #161b22; stroke: #3fb950; stroke-width: 2; rx: 8; ry: 8; }
      .box-blue { fill: #161b22; stroke: #58a6ff; stroke-width: 2; rx: 8; ry: 8; }
      .box-purple { fill: #161b22; stroke: #bc8cff; stroke-width: 2; rx: 8; ry: 8; }
      .box-orange { fill: #161b22; stroke: #d29922; stroke-width: 2; rx: 8; ry: 8; }
      .title { fill: #f0f6fc; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 16px; font-weight: bold; }
      .label { fill: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; }
      .label-sm { fill: #8b949e; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 11px; }
      .arrow { fill: none; stroke: #484f58; stroke-width: 2; marker-end: url(#arrowhead); }
      .badge-green { fill: #238636; rx: 4; ry: 4; }
      .badge-blue { fill: #1f6feb; rx: 4; ry: 4; }
      .badge-purple { fill: #8957e5; rx: 4; ry: 4; }
      .badge-text { fill: #ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 10px; font-weight: bold; }
      .heading { fill: #58a6ff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 20px; font-weight: bold; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#484f58"/>
    </marker>
  </defs>

  <rect class="bg" width="820" height="400" rx="6"/>

  <!-- Title -->
  <text class="heading" x="410" y="35" text-anchor="middle">SFT Data Pipeline &amp; Evaluation</text>

  <!-- Row 1: Agent Run -->
  <rect class="box-green" x="20" y="60" width="170" height="80"/>
  <text class="title" x="105" y="90" text-anchor="middle">Agent Run</text>
  <text class="label-sm" x="105" y="108" text-anchor="middle">ReAct loop fixes bugs</text>
  <text class="label-sm" x="105" y="122" text-anchor="middle">inside Docker sandbox</text>

  <line class="arrow" x1="190" y1="100" x2="230" y2="100"/>

  <!-- Log File -->
  <rect class="box" x="230" y="60" width="170" height="80"/>
  <text class="title" x="315" y="90" text-anchor="middle">Log File</text>
  <text class="label-sm" x="315" y="108" text-anchor="middle">agent_runs.jsonl</text>
  <text class="label-sm" x="315" y="122" text-anchor="middle">Every event recorded</text>

  <line class="arrow" x1="400" y1="100" x2="440" y2="100"/>

  <!-- SFT Collector -->
  <rect class="box-blue" x="440" y="60" width="170" height="80"/>
  <text class="title" x="525" y="90" text-anchor="middle">SFT Collector</text>
  <text class="label-sm" x="525" y="108" text-anchor="middle">Extracts successful</text>
  <text class="label-sm" x="525" y="122" text-anchor="middle">runs as train pairs</text>

  <line class="arrow" x1="610" y1="100" x2="650" y2="100"/>

  <!-- SFT Exporter -->
  <rect class="box-purple" x="650" y="60" width="150" height="80"/>
  <text class="title" x="725" y="90" text-anchor="middle">Exporter</text>
  <text class="label-sm" x="725" y="108" text-anchor="middle">Alpaca / Chat</text>
  <text class="label-sm" x="725" y="122" text-anchor="middle">HuggingFace format</text>

  <!-- Arrow down from Exporter -->
  <line class="arrow" x1="725" y1="140" x2="725" y2="180"/>

  <!-- Dataset File -->
  <rect class="box-purple" x="625" y="180" width="175" height="65"/>
  <text class="title" x="712" y="205" text-anchor="middle">sft_dataset.jsonl</text>
  <text class="label-sm" x="712" y="225" text-anchor="middle">Ready for fine-tuning</text>

  <!-- Arrow down to Fine-tuning -->
  <line class="arrow" x1="712" y1="245" x2="712" y2="285"/>

  <!-- Fine-tuning Target -->
  <rect class="box-orange" x="600" y="285" width="200" height="80"/>
  <text class="title" x="700" y="315" text-anchor="middle">Fine-Tune Model</text>
  <text class="label-sm" x="700" y="333" text-anchor="middle">Llama 3 / Mistral</text>
  <text class="label-sm" x="700" y="347" text-anchor="middle">via Unsloth or PEFT</text>

  <!-- Row 2: Evaluation Pipeline -->
  <rect class="box-green" x="20" y="200" width="170" height="80"/>
  <text class="title" x="105" y="230" text-anchor="middle">Reset Sandbox</text>
  <text class="label-sm" x="105" y="248" text-anchor="middle">docker-compose</text>
  <text class="label-sm" x="105" y="262" text-anchor="middle">down + up --build</text>

  <line class="arrow" x1="190" y1="240" x2="230" y2="240"/>

  <!-- Run Agent -->
  <rect class="box-blue" x="230" y="200" width="170" height="80"/>
  <text class="title" x="315" y="230" text-anchor="middle">Run Agent</text>
  <text class="label-sm" x="315" y="248" text-anchor="middle">Full ReAct loop</text>
  <text class="label-sm" x="315" y="262" text-anchor="middle">against fresh bugs</text>

  <line class="arrow" x1="400" y1="240" x2="440" y2="240"/>

  <!-- Score -->
  <rect class="box-orange" x="440" y="200" width="170" height="80"/>
  <text class="title" x="525" y="230" text-anchor="middle">Score Run</text>
  <text class="label-sm" x="525" y="248" text-anchor="middle">Pass/fail, attempts</text>
  <text class="label-sm" x="525" y="262" text-anchor="middle">tools, efficiency</text>

  <!-- Arrow down from Log to Eval -->
  <line class="arrow" x1="315" y1="140" x2="315" y2="200"/>

  <!-- Arrow down from Score to Report -->
  <line class="arrow" x1="525" y1="280" x2="525" y2="320"/>

  <!-- Eval Report -->
  <rect class="box-orange" x="430" y="320" width="180" height="55"/>
  <text class="title" x="520" y="345" text-anchor="middle">eval_report.json</text>
  <text class="label-sm" x="520" y="363" text-anchor="middle">Benchmark results</text>

  <!-- Badges -->
  <rect class="badge-green" x="20" y="370" width="80" height="20"/>
  <text class="badge-text" x="60" y="384" text-anchor="middle">DATA FLOW</text>

  <rect class="badge-blue" x="110" y="370" width="80" height="20"/>
  <text class="badge-text" x="150" y="384" text-anchor="middle">PROCESSING</text>

  <rect class="badge-purple" x="200" y="370" width="80" height="20"/>
  <text class="badge-text" x="240" y="384" text-anchor="middle">SFT OUTPUT</text>

  <rect x="290" y="370" width="80" height="20" fill="#9e6a03" rx="4" ry="4"/>
  <text class="badge-text" x="330" y="384" text-anchor="middle">EVALUATION</text>
</svg>
