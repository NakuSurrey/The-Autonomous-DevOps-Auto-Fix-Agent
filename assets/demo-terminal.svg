<svg xmlns="http://www.w3.org/2000/svg" width="820" height="620" viewBox="0 0 820 620">
  <defs>
    <style>
      .bg { fill: #1e1e2e; }
      .titlebar { fill: #313244; }
      .btn-red { fill: #f38ba8; }
      .btn-yellow { fill: #f9e2af; }
      .btn-green { fill: #a6e3a1; }
      .text { fill: #cdd6f4; font-family: 'Courier New', monospace; font-size: 13px; }
      .text-dim { fill: #6c7086; font-family: 'Courier New', monospace; font-size: 13px; }
      .text-green { fill: #a6e3a1; font-family: 'Courier New', monospace; font-size: 13px; }
      .text-red { fill: #f38ba8; font-family: 'Courier New', monospace; font-size: 13px; }
      .text-yellow { fill: #f9e2af; font-family: 'Courier New', monospace; font-size: 13px; }
      .text-blue { fill: #89b4fa; font-family: 'Courier New', monospace; font-size: 13px; }
      .text-cyan { fill: #94e2d5; font-family: 'Courier New', monospace; font-size: 13px; }
      .text-title { fill: #cdd6f4; font-family: 'Courier New', monospace; font-size: 12px; }
      .separator { fill: #585b70; font-family: 'Courier New', monospace; font-size: 13px; }
    </style>
  </defs>

  <!-- Terminal Window -->
  <rect class="bg" width="820" height="620" rx="10" ry="10"/>
  <rect class="titlebar" width="820" height="36" rx="10" ry="10"/>
  <rect class="titlebar" y="20" width="820" height="16"/>

  <!-- Window Buttons -->
  <circle class="btn-red" cx="20" cy="18" r="6"/>
  <circle class="btn-yellow" cx="40" cy="18" r="6"/>
  <circle class="btn-green" cx="60" cy="18" r="6"/>

  <!-- Title -->
  <text class="text-title" x="370" y="22" text-anchor="middle">python -m agent.main</text>

  <!-- Terminal Content -->
  <g transform="translate(20, 55)">
    <text class="separator" y="0">============================================================</text>
    <text class="text-blue" y="18">  AUTONOMOUS DEVOPS &amp; AUTO-FIX AGENT</text>
    <text class="separator" y="36">============================================================</text>
    <text class="text" y="54">  Model:        gemini-1.5-flash</text>
    <text class="text" y="72">  Max attempts: 5</text>
    <text class="text" y="90">  Log level:    INFO</text>
    <text class="separator" y="108">============================================================</text>

    <text class="text" y="136">Starting agent...</text>

    <text class="separator" y="164">============================================================</text>
    <text class="text-dim" y="182">[SYSTEM]</text>
    <text class="separator" y="200">============================================================</text>
    <text class="text" y="218">Running initial test suite...</text>

    <text class="text-red" y="246">[TEST_FAILURE]</text>
    <text class="text" y="264">FAILED  test_subtract_positive - assert 8 == 2</text>
    <text class="text" y="282">FAILED  test_multiply_positive - assert 16 == 15</text>
    <text class="text" y="300">FAILED  test_divide_by_zero   - ZeroDivisionError</text>

    <text class="text-cyan" y="328">[THOUGHT]</text>
    <text class="text" y="346">subtract uses + instead of -. multiply adds 1.</text>
    <text class="text" y="364">divide is missing a zero check. Reading source...</text>

    <text class="text-yellow" y="392">[ACTION]  read_file("calculator.py")</text>
    <text class="text-yellow" y="410">[ACTION]  write_file("calculator.py", &lt;fixed_code&gt;)</text>
    <text class="text-yellow" y="428">[ACTION]  run_tests("tests/")</text>

    <text class="text-green" y="456">[SYSTEM] ALL TESTS PASSED! Fix successful.</text>
    <text class="text-green" y="474">[SYSTEM] Branch: auto-fix/run-a3f2b1c4</text>
    <text class="text-green" y="492">[SYSTEM] Commit: fix: auto-fix by DevOps Agent</text>

    <text class="separator" y="520">============================================================</text>
    <text class="text-green" y="538">  STATUS:   SUCCESS   |   ATTEMPTS: 1   |   EFFICIENCY: 100%</text>
    <text class="separator" y="556">============================================================</text>
