      .btn-red { fill: #f85149; }
      .btn-yellow { fill: #d29922; }
      .btn-green { fill: #3fb950; }
      .t { fill: #c9d1d9; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Courier New', monospace; font-size: 12.5px; }
      .dim { fill: #484f58; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Courier New', monospace; font-size: 12.5px; }
      .g { fill: #3fb950; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Courier New', monospace; font-size: 12.5px; }
      .r { fill: #f85149; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Courier New', monospace; font-size: 12.5px; }
      .y { fill: #d29922; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Courier New', monospace; font-size: 12.5px; }
      .b { fill: #58a6ff; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Courier New', monospace; font-size: 12.5px; }
      .c { fill: #79c0ff; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Courier New', monospace; font-size: 12.5px; }
      .m { fill: #bc8cff; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Courier New', monospace; font-size: 12.5px; }
      .w { fill: #f0f6fc; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Courier New', monospace; font-size: 12.5px; font-weight: bold; }
      .sep { fill: #30363d; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Courier New', monospace; font-size: 12.5px; }
      .tt { fill: #8b949e; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; }
    </style>
  </defs>

  <!-- Window Frame -->
  <rect class="bg" width="860" height="680" rx="10"/>
  <rect class="titlebar" width="860" height="38" rx="10"/>
  <rect class="titlebar" y="22" width="860" height="16"/>
  <circle class="btn-red" cx="20" cy="19" r="6.5"/>
  <circle class="btn-yellow" cx="42" cy="19" r="6.5"/>
  <circle class="btn-green" cx="64" cy="19" r="6.5"/>
  <text class="tt" x="430" y="23" text-anchor="middle">python -m agent.main</text>

  <!-- Terminal Output -->
  <g transform="translate(22, 56)">
    <!-- Banner -->
    <text class="sep" y="0">============================================================</text>
    <text class="w" y="17">  AUTONOMOUS DEVOPS &amp; AUTO-FIX AGENT</text>
    <text class="sep" y="34">============================================================</text>
    <text class="t" y="51">  Model:        <tspan class="b">gemini-1.5-flash</tspan></text>
    <text class="t" y="68">  Max attempts: <tspan class="b">5</tspan></text>
    <text class="t" y="85">  Log level:    <tspan class="b">INFO</tspan></text>
    <text class="sep" y="102">============================================================</text>

    <!-- Initial test run -->
    <text class="dim" y="127">[SYSTEM] Running initial test suite...</text>

    <!-- Test failures -->
    <text class="r" y="152">[TEST_FAILURE] 6 of 12 tests FAILED</text>
    <text class="r" y="169">  FAILED test_subtract_positive     — assert subtract(5,3)==2  got 8</text>
    <text class="r" y="186">  FAILED test_subtract_negative     — assert subtract(-1,-1)==0 got -2</text>
    <text class="r" y="203">  FAILED test_multiply_positive     — assert multiply(3,5)==15 got 16</text>
    <text class="r" y="220">  FAILED test_multiply_by_zero      — assert multiply(0,5)==0  got 1</text>
    <text class="r" y="237">  FAILED test_divide_by_zero        — ZeroDivisionError raised</text>
    <text class="r" y="254">  FAILED test_divide_by_zero_msg    — ValueError not raised</text>

    <!-- Attempt 1 -->
    <text class="sep" y="279">--- Attempt 1 of 5 ---</text>

    <text class="m" y="301">[THOUGHT] Three bugs found in the test output:</text>
    <text class="m" y="318">  1. subtract() returns a+b instead of a-b</text>
    <text class="m" y="335">  2. multiply() returns a*b+1 instead of a*b</text>
    <text class="m" y="352">  3. divide() has no zero-division check</text>
    <text class="m" y="369">  Reading calculator.py to confirm...</text>

    <text class="y" y="394">[ACTION]  read_file("calculator.py")</text>
    <text class="c" y="411">[RESULT]  52 lines read — confirmed all 3 bugs</text>

    <text class="m" y="436">[THOUGHT] Writing fix: subtract→a-b, multiply→a*b, divide→add ValueError</text>

    <text class="y" y="461">[ACTION]  write_file("calculator.py", &lt;fixed code — 51 lines&gt;)</text>
    <text class="c" y="478">[RESULT]  File written successfully</text>

    <text class="y" y="503">[ACTION]  run_tests("tests/")</text>
    <text class="g" y="520">[RESULT]  12 passed, 0 failed</text>

    <!-- Success -->
    <text class="sep" y="545">============================================================</text>
    <text class="g" y="562">  ALL TESTS PASSED — Fix successful on attempt 1</text>
    <text class="sep" y="579">============================================================</text>

    <text class="g" y="601">  Branch:     auto-fix/run-a3f2b1c4</text>
    <text class="g" y="618">  Commit:     fix: resolved 3 bugs in calculator.py (run a3f2b1c4)</text>
  </g>
</svg>
